{% extends 'base.html' %}
{% load static %}

{% block content %}

<div class="d-flex justify-content-center align-items-center" style="min-height: 80vh;">

    <div class="card shadow-lg p-4 task-card">
        <h2 class="text-center mb-4">📝 Add Task</h2>

        <form method="POST">
            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label">Title</label>
                <input type="text" name="title" class="form-control" placeholder="Enter task title" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Description</label>
                <textarea name="description" class="form-control" placeholder="Enter description"></textarea>
            </div>

            <div class="mb-3">
                <label class="form-label">Due Date & Time</label>
                <input type="datetime-local" name="due_date" class="form-control" required>
            </div>

            <button type="submit" class="btn btn-success w-100">
                Save Task
            </button>
        </form>

        <a href="{% url 'dashboard' %}" class="btn btn-secondary mt-3 w-100">
            Back
        </a>

    </div>

</div>

{% endblock %}
