{% extends 'base.html' %}
{% block content %}

<h2 class="mb-4">Your Tasks</h2>

<a href="{% url 'add_task' %}" class="btn btn-success mb-3">+ Add Task</a>

<ul class="list-group">
    {% for task in tasks %}
    <li class="list-group-item d-flex justify-content-between align-items-center
        {% if task.completed %}completed{% endif %}">
        
        <div>
            <strong>{{ task.title }}</strong><br>
            <small>{{ task.due_date }}</small>
        </div>

        <div>
            <a href="{% url 'toggle_task' task.id %}" class="btn btn-sm btn-info">✔</a>
            <a href="{% url 'update_task' task.id %}" class="btn btn-sm btn-warning">Edit</a>
            <a href="{% url 'delete_task' task.id %}" class="btn btn-sm btn-danger">Delete</a>
        </div>
    </li>
    {% endfor %}
</ul>

{% endblock %}
